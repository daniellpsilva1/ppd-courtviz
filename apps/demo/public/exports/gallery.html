<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courtviz Exports — Boluda Match</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
      }
      body { margin: 0; padding: 24px; }
      h1, h2 { font-weight: 600; letter-spacing: -0.02em; }
      h1 { margin: 0 0 8px; font-size: 1.75rem; }
      p { color: #94a3b8; margin: 0 0 24px; }
      section { margin-bottom: 40px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
      figure {
        margin: 0;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        overflow: hidden;
      }
      img, video {
        display: block;
        width: 100%;
        height: auto;
        background: #020617;
      }
      figcaption {
        padding: 10px 12px;
        font-size: 0.85rem;
        color: #cbd5e1;
      }
      .links { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
      a {
        color: #38bdf8;
        text-decoration: none;
        padding: 8px 12px;
        border: 1px solid #1e3a5f;
        border-radius: 8px;
        background: #0f172a;
      }
      a:hover { background: #172554; }
      pre {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 16px;
        overflow: auto;
        white-space: pre-wrap;
        font-size: 0.85rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>Courtviz Match Recap Exports</h1>
    <p>Kaitlin Quevedo vs Ángela Boluda — deck, posters, videos, and captions</p>

    <div class="links">
      <a href="http://127.0.0.1:5173/" target="_blank">Interactive demo</a>
      <a href="http://localhost:3000/" target="_blank">Remotion studio</a>
      <a href="deck/manifest.json" target="_blank">Deck manifest</a>
      <a href="captions/" target="_blank">Captions folder</a>
    </div>

    <section>
      <h2>Videos</h2>
      <div class="grid">
        <figure>
          <video src="video/match-recap-social.mp4" controls playsinline></video>
          <figcaption>Social vertical (~27s)</figcaption>
        </figure>
        <figure>
          <video src="video/match-recap-landscape.mp4" controls playsinline></video>
          <figcaption>Landscape recap</figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Story deck (20 slides)</h2>
      <div class="grid" id="story-deck"></div>
    </section>

    <section>
      <h2>Portrait deck</h2>
      <div class="grid" id="portrait-deck"></div>
    </section>

    <section>
      <h2>Posters — story format</h2>
      <div class="grid" id="story-posters"></div>
    </section>

    <section>
      <h2>Instagram captions</h2>
      <pre id="captions"></pre>
    </section>

    <script>
      const storySlides = [
        "slide-cover","slide-serve","slide-placement","slide-zones","slide-patterns","slide-rally",
        "slide-momentum","slide-match-numbers","slide-shotmaking","slide-errors","slide-density",
        "slide-coach","slide-cta"
      ];
      const posters = [
        "court-dominance","hexbin-host","dotdensity","serve-host","rays-host","momentum","coach-insights"
      ];

      function addCards(containerId, base, items, ext = "png") {
        const root = document.getElementById(containerId);
        for (const item of items) {
          const figure = document.createElement("figure");
          const img = document.createElement("img");
          img.loading = "lazy";
          img.src = `${base}/${item}.${ext}`;
          img.alt = item;
          const cap = document.createElement("figcaption");
          cap.textContent = item.replace(/^slide-/, "").replace(/-/g, " ");
          figure.append(img, cap);
          root.append(figure);
        }
      }

      addCards("story-deck", "deck/story", storySlides);
      addCards("portrait-deck", "deck/portrait", storySlides);
      addCards("story-posters", "story", posters);

      fetch("captions/instagram.txt")
        .then((r) => r.text())
        .then((t) => { document.getElementById("captions").textContent = t; })
        .catch(() => {
          document.getElementById("captions").textContent = "Caption file not found.";
        });
    </script>
  </body>
</html>
