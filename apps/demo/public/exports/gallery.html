<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courtviz Match Recap</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
      }
      body { margin: 0; padding: 24px; max-width: 1200px; }
      h1, h2 { font-weight: 600; letter-spacing: -0.02em; }
      h1 { margin: 0 0 8px; font-size: 1.75rem; }
      p { color: #94a3b8; margin: 0 0 24px; }
      section { margin-bottom: 40px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
      figure {
        margin: 0;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        overflow: hidden;
      }
      img, video {
        display: block;
        width: 100%;
        height: auto;
        background: #020617;
      }
      figcaption {
        padding: 10px 12px;
        font-size: 0.85rem;
        color: #cbd5e1;
      }
      .links { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
      a {
        color: #38bdf8;
        text-decoration: none;
        padding: 8px 12px;
        border: 1px solid #1e3a5f;
        border-radius: 8px;
        background: #0f172a;
      }
      a:hover { background: #172554; }
    </style>
  </head>
  <body>
    <h1>Match Recap Exports</h1>
    <p>Three deliverables: horizontal video, vertical video, and vertical post deck (9:16).</p>

    <div class="links">
      <a href="deck/manifest.json" target="_blank">Deck manifest</a>
      <a href="captions/instagram.txt" target="_blank">Instagram caption</a>
    </div>

    <section>
      <h2>Videos</h2>
      <div class="grid">
        <figure>
          <video src="video/match-recap-landscape.mp4" controls playsinline></video>
          <figcaption>Horizontal match recap</figcaption>
        </figure>
        <figure>
          <video src="video/match-recap-social.mp4" controls playsinline></video>
          <figcaption>Vertical match recap (Instagram / TikTok)</figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Vertical post deck (13 slides)</h2>
      <div class="grid" id="deck"></div>
    </section>

    <script>
      const slides = [
        "slide-cover","slide-serve","slide-placement","slide-zones","slide-patterns","slide-rally",
        "slide-momentum","slide-match-numbers","slide-shotmaking","slide-errors","slide-density",
        "slide-coach","slide-cta"
      ];

      const root = document.getElementById("deck");
      for (const slide of slides) {
        const figure = document.createElement("figure");
        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = `deck/${slide}.png`;
        img.alt = slide;
        const cap = document.createElement("figcaption");
        cap.textContent = slide.replace(/^slide-/, "").replace(/-/g, " ");
        figure.append(img, cap);
        root.append(figure);
      }
    </script>
  </body>
</html>
